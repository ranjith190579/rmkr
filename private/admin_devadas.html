<!DOCTYPE html>
<html>
<body>

<h2>Admin Panel</h2>

<button onclick="downloadOrders()">
Download Orders
</button>

<script>

async function downloadOrders() {

    const response =
        await fetch('/download-orders');

    const data =
        await response.json();

    alert(
        data.count +
        ' Orders Downloaded'
    );

}

</script>

</body>
</html>
