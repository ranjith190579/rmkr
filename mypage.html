<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,.2);
            text-align: center;
        }

        h1 {
            color: green;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #time {
            margin-top: 15px;
            color: blue;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>✅ Test Page</h1>

    <p>If you can see this page, HTML is working correctly.</p>

    <button onclick="showTime()">Show Current Time</button>

    <div id="time"></div>
</div>

<script>
function showTime() {
    document.getElementById("time").innerHTML =
        "Current Time: " + new Date().toLocaleString();
}
</script>

</body>
</html>
