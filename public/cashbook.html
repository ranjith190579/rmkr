<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<button onclick="exitCashbook()">Exit</button>
<title>Daily Cash Book</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f5f5;
}

.header{
    position:sticky;
    top:0;
    background:#fff;
    padding:15px;
    border-bottom:1px solid #ddd;
    box-shadow:0 2px 5px rgba(0,0,0,.08);
    z-index:100;
}

.header h2{
    color:#1976d2;
    margin-bottom:15px;
}

.entryRow{

    display:flex;

    align-items:center;

    gap:8px;

    margin-bottom:10px;

    flex-wrap:wrap;

}

.entryRow label{

    font-weight:bold;

    white-space:nowrap;

}

.entryRow input,
.entryRow select{

    height:34px;

    padding:5px 8px;

    border:1px solid #bbb;

    border-radius:5px;

}


#txtDate{

    width:150px;

}

#txtOpening{

    width:130px;

    text-align:right;

}

#cmbType{

    width:130px;

}

#txtAmount{

    width:130px;

    text-align:right;

}

#txtClosing{

    width:130px;

    text-align:right;

}


.remarksRow{

    display:flex;

    align-items:center;

    gap:8px;

}

.remarksRow label{

    font-weight:bold;

}

#txtRemarks{

    flex:1;

    height:34px;

    padding:5px 8px;

    border:1px solid #bbb;

    border-radius:5px;

}

.readonly{
    background:#ececec;
}

.summary{

    margin-top:10px;

    padding:10px;

    background:#eef7ff;

    border:1px solid #cfe5ff;

    border-radius:6px;

    display:flex;

    justify-content:space-between;

    flex-wrap:wrap;

    font-weight:bold;
}

#btnSave{

    width:120px;

    height:36px;

    margin:0;

    background:#2e7d32;

    color:white;

    border:none;

    border-radius:5px;

    cursor:pointer;

    font-weight:bold;

}

#btnSave:hover{

    background:#1b5e20;
}

.tableArea{

    max-height:calc(100vh - 260px);

    overflow-y:auto;

    background:#fff;

    border:1px solid #ddd;

}
table{

    width:100%;

    border-collapse:collapse;

}

thead{

    position:sticky;

    top:0;

    z-index:10;

    background:#1976d2;

    color:#fff;

}

th{

    padding:10px;

    border:1px solid #ddd;

    font-size:14px;
}

td{

    padding:8px;

    border:1px solid #ddd;

    font-size:14px;
}

tbody tr:hover{

    background:#fff8dc;

    cursor:pointer;
}

.lastRow{

    background:#fff3cd;
}

.balance{

    text-align:right;
}

.center{

    text-align:center;
}

.popup{

    display:none;

    position:fixed;

    left:0;
    right:0;
    top:0;
    bottom:0;

    background:rgba(0,0,0,.45);

    justify-content:center;

    align-items:center;

    z-index:999;
}

.popupContent{

    background:white;

    width:500px;

    max-width:95%;

    border-radius:8px;

    overflow:hidden;
}

.popupHeader{

    background:#1976d2;

    color:white;

    padding:12px;

    font-size:18px;
}

.popupBody{

    padding:15px;
}

.popupFooter{

    padding:15px;

    display:flex;

    gap:10px;
}

.popupFooter button{

    flex:1;

    padding:10px;

    border:none;

    color:white;

    border-radius:6px;

    cursor:pointer;
}

#btnUpdate{

    background:#1976d2;
}

#btnDelete{

    background:#d32f2f;
}

#btnCancel{

    background:#666;
}

@media(max-width:700px){

.entryRow{

    flex-wrap:wrap;

}

.remarksRow{

    flex-wrap:wrap;

}

#txtRemarks{

    width:100%;

}

#btnSave{

    width:100%;

}

}

.formRow{

    display:flex;

    align-items:center;

    margin-bottom:10px;

    gap:10px;

}

.formRow label{

    width:90px;

    font-weight:bold;

}

.formRow input,
.formRow select,
.formRow textarea{

    flex:1;

    padding:8px;

    border:1px solid #bbb;

    border-radius:5px;

}
.timeColumn{

    width:100px;

    text-align:center;

    white-space:nowrap;

}
.suggestions-dropdown{

    position:fixed;

    background:#fff;

    border:1px solid #bbb;

    border-radius:5px;

    box-shadow:0 3px 8px rgba(0,0,0,.2);

    max-height:250px;

    overflow-y:auto;

    z-index:9999;

    min-width:250px;

}

.suggestions-dropdown.hidden{

    display:none;

}

.suggestion-item{

    padding:8px 10px;

    cursor:pointer;

}

.suggestion-item:hover{

    background:#dceeff;

}

.suggestion-item.selected{

    background:#1976d2;

    color:white;

}
</style>

</head>

<body>

<div class="header">

<h2>Daily Cash Book</h2>

<!-- ===================== -->
<!-- Row 1 -->
<!-- ===================== -->

<div class="entryRow">
    <label>Customer :</label>

    <input
        type="text"
        id="txtCustomer"
        placeholder="Type customer name..."
        autocomplete="off">
        
    <label>Date :</label>

    <input
        type="date"
        id="txtDate">

 


    <label>Opening :</label>

    <input
        type="text"
        id="txtOpening"
        class="readonly"
        readonly>

    <label>Type :</label>

    <select id="cmbType">

        <option value="Receipt">
            Receipt
        </option>

        <option value="Payment" selected>
            Payment
        </option>

    </select>

</div>
<div
    id="customerSuggestions"
    class="suggestions-dropdown hidden">
</div>

<!-- ===================== -->
<!-- Row 2 -->
<!-- ===================== -->

<div class="entryRow">

    <label id="lblAmount">

        Amount :

    </label>

    <input
        type="text"
        id="txtAmount"
        inputmode="decimal">

    <label>Closing :</label>

    <input
        type="text"
        id="txtClosing"
        class="readonly"
        readonly>

</div>


<!-- ===================== -->
<!-- Row 3 -->
<!-- ===================== -->

<div class="remarksRow">

    <label>

        Remarks :

    </label>

    <input
        type="text"
        id="txtRemarks">

    <button id="btnSave">

        SAVE

    </button>

</div>

<div class="summary">

<div>

Current Balance :
<b id="lblCurrentBalance">
0.00
</b>

</div>

<div>

Last Entry :
<b id="lblLastEntry">

-

</b>

</div>

</div>

</div>

<div class="tableArea">

<table>

<thead>

<tr>
    <th>Date</th>
    <th>Time</th>
    <th>Opening</th>
    <th>Payment</th>
    <th>Receipt</th>
    <th>Closing</th>
    <th>Remarks</th>
</tr>

</thead>

<tbody id="tbodyLedger">

<tr>

<td colspan="6" class="center">

No Entries

</td>

</tr>

</tbody>

</table>

</div>

<div
class="popup"
id="editPopup">

<div
class="popupContent">

<div
class="popupHeader">

Edit Cash Entry

</div>

<div
class="popupBody">

<div class="formRow">

<label>Date</label>

<input
type="date"
id="editDate">

</div>

<div class="formRow">

<label>Opening</label>

<input
type="text"
id="editOpening"
readonly
class="readonly">

</div>

<div class="formRow">

<label>Type</label>

<select id="editType">

<option>

Receipt

</option>

<option>

Payment

</option>

</select>

</div>

<div class="formRow">

<label id="editAmountLabel">

Receipt

</label>

<input
type="text"
id="editAmount">

</div>

<div class="formRow">

<label>Closing</label>

<input
type="text"
id="editClosing"
readonly
class="readonly">

</div>

<div class="formRow">

<label>Remarks</label>

<textarea id="editRemarks"></textarea>

</div>

</div>

<div
class="popupFooter">

<button id="btnUpdate">

UPDATE

</button>

<button id="btnDelete">

DELETE

</button>

<button id="btnCancel">

CANCEL

</button>

</div>

</div>

</div>
<script>async function exitCashbook(){

    await closeCashbook();

    window.location.href="/";

}</script>


<script src="cashbook.js"></script>

</body>
</html>
